<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Legal Pages</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --paper: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --line: #d9e1ec;
      --accent: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(840px, calc(100% - 32px));
      margin: 40px auto;
      padding: 36px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }

    h2 {
      margin: 28px 0 10px;
      font-size: 20px;
    }

    p {
      margin: 10px 0;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    ul {
      padding-left: 22px;
    }

    li {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Game Legal Pages</h1>
    <p>Public legal pages for games published by PanJung99.</p>

    <h2>银河火线</h2>
    <ul>
      <li><a href="galactic-fireline/taptap/privacy/">TapTap 隐私政策</a></li>
    </ul>
  </main>
</body>
</html>
